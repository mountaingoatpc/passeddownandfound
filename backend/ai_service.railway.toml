# Railway config for the AI service (not the API service).
# In the AI service settings, set "Config file path" to: /backend/ai_service.railway.toml
# Or set service variable: RAILWAY_DOCKERFILE_PATH=ai_service/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "ai_service/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
