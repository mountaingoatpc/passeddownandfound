# AI service Railway config.
#
# Railway → AI service → Settings:
#   Root Directory:     backend/ai_service
#   Config file path:   /backend/ai_service/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/ai_service/**"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
