version: "3"

tasks:
  install:
    desc: Install all dependencies (backend + frontend)
    cmds:
      - task: backend:install
      - task: frontend:install

  backend:install:
    desc: Install backend dependencies with uv
    dir: backend
    cmds:
      - uv sync --extra dev

  backend:lint:
    desc: Run ruff linter
    dir: backend
    cmds:
      - uv run ruff check .

  backend:format:
    desc: Format backend code with ruff
    dir: backend
    cmds:
      - uv run ruff format .

  backend:check:
    desc: Run both lint and format check
    dir: backend
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  api_service:dev:
    desc: "Run API server locally. Usage: task api_service:dev [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python -m api_service.api

  ai_service:dev:
    desc: "Run AI service locally. Usage: task ai_service:dev [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python -m ai_service.app

  frontend:install:
    desc: Install frontend dependencies with bun
    dir: frontend
    cmds:
      - bun install

  frontend:dev:
    desc: Run frontend dev server
    dir: frontend
    cmds:
      - bun run dev

  frontend:build:
    desc: Build frontend for production
    dir: frontend
    cmds:
      - bun run build

  frontend:check:
    desc: Run Biome check
    dir: frontend
    cmds:
      - bun run check

  lint:
    desc: Run all linters (backend + frontend)
    cmds:
      - task: backend:check
      - task: frontend:check

  db:create:
    desc: Start a local PostgreSQL container (Docker)
    cmds:
      - docker run -d --name atticory-db -e POSTGRES_DB=atticory -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -p 5432:5432 postgres:16
      - echo "Waiting for Postgres to be ready..."
      - sleep 3
    status:
      - docker ps --filter name=atticory-db -q | grep -q .

  db:start:
    desc: Start the local PostgreSQL container (if stopped)
    cmds:
      - docker start atticory-db

  db:stop:
    desc: Stop the local PostgreSQL container
    cmds:
      - docker stop atticory-db

  db:deploy:
    desc: "Create database tables (idempotent). Usage: task db:deploy [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python api_service/scripts/deploy_tables.py

  db:reset:
    desc: "Drop and recreate all tables (DESTRUCTIVE). Usage: task db:reset [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python api_service/scripts/deploy_tables.py --reset

  db:psql:
    desc: "Open psql shell. Usage: task db:psql [ENV=local]"
    dir: backend
    interactive: true
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - PGPASSWORD="${DB_PASSWORD}" psql -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER}" -d "${DB_NAME}"

  test:backend:
    desc: "Run backend tests. Usage: task test:backend [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run pytest tests/ -v

  # ─────────────────────────────────────────────
  # Release
  # ─────────────────────────────────────────────
  release-full:
    desc: "Full interactive prod release. Usage: task release-full VERSION=v1.0.0"
    requires:
      vars: [VERSION]
    cmds:
      - task: release:preflight
      - task: release:lint
      - task: release:test
      - task: release:merge
      - task: release:push
      - task: release:gh-release
        vars:
          VERSION: "{{.VERSION}}"
      - task: release:finish
        vars:
          VERSION: "{{.VERSION}}"

  release:
    desc: "Create GitHub Release only (release branch already pushed). Usage: task release VERSION=v1.0.0"
    requires:
      vars: [VERSION]
    cmds:
      - task: release:gh-release
        vars:
          VERSION: "{{.VERSION}}"

  release:preflight:
    desc: Verify release prerequisites
    internal: true
    preconditions:
      - sh: test -z "$(git status --porcelain)"
        msg: "Working tree must be clean (commit or stash changes first)"
      - sh: test "$(git branch --show-current)" = "main"
        msg: "Must be on main branch"
      - sh: command -v gh >/dev/null 2>&1
        msg: "GitHub CLI (gh) is required — install from https://cli.github.com"
    cmds:
      - git fetch origin

  release:lint:
    desc: "Release step 1/6 — lint"
    internal: true
    prompt: "Run lint (backend ruff + frontend Biome)?"
    cmds:
      - task: lint

  release:test:
    desc: "Release step 2/6 — backend tests"
    internal: true
    prompt: "Run backend tests?"
    cmds:
      - task: test:backend

  release:merge:
    desc: "Release step 3/6 — merge main into release"
    internal: true
    prompt: "Merge main into release branch?"
    cmds:
      - git checkout release
      - git merge main --no-edit

  release:push:
    desc: "Release step 4/6 — push release (triggers Railway prod deploy)"
    internal: true
    prompt: "Push release branch to origin (triggers Railway prod deploy)?"
    cmds:
      - git push origin release

  release:gh-release:
    desc: "Release step 5/6 — create GitHub Release"
    internal: true
    requires:
      vars: [VERSION]
    prompt: "Create GitHub Release {{.VERSION}}?"
    cmds:
      - gh release create {{.VERSION}} --target release --generate-notes --latest

  release:finish:
    desc: "Release step 6/6 — return to main"
    internal: true
    requires:
      vars: [VERSION]
    cmds:
      - git checkout main
      - |
        echo ""
        echo "════════════════════════════════════════════════════════════"
        echo "  Release complete."
        echo ""
        echo "  If this release included schema changes, run:"
        echo "    task db:deploy ENV=prod"
        echo ""
        echo "  Verify Railway prod deploy and:"
        echo "    gh release view {{.VERSION}}"
        echo "════════════════════════════════════════════════════════════"
