version: "3"

tasks:
  install:
    desc: Install all dependencies (backend + frontend)
    cmds:
      - task: backend:install
      - task: frontend:install

  backend:install:
    desc: Install backend dependencies with uv
    dir: backend
    cmds:
      - uv sync --extra dev

  backend:lint:
    desc: Run ruff linter
    dir: backend
    cmds:
      - uv run ruff check .

  backend:format:
    desc: Format backend code with ruff
    dir: backend
    cmds:
      - uv run ruff format .

  backend:check:
    desc: Run both lint and format check
    dir: backend
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  api_service:dev:
    desc: "Run API server locally. Usage: task api_service:dev [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python -m api_service.api

  ai_service:dev:
    desc: "Run AI service locally. Usage: task ai_service:dev [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python -m ai_service.app

  frontend:install:
    desc: Install frontend dependencies with bun
    dir: frontend
    cmds:
      - bun install

  frontend:dev:
    desc: Run frontend dev server
    dir: frontend
    cmds:
      - bun run dev

  frontend:build:
    desc: Build frontend for production
    dir: frontend
    cmds:
      - bun run build

  frontend:check:
    desc: Run Biome check
    dir: frontend
    cmds:
      - bun run check

  lint:
    desc: Run all linters (backend + frontend)
    cmds:
      - task: backend:check
      - task: frontend:check

  db:create:
    desc: Start a local PostgreSQL container (Docker)
    cmds:
      - docker run -d --name atticory-db -e POSTGRES_DB=atticory -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -p 5432:5432 postgres:16
      - echo "Waiting for Postgres to be ready..."
      - sleep 3
    status:
      - docker ps --filter name=atticory-db -q | grep -q .

  db:start:
    desc: Start the local PostgreSQL container (if stopped)
    cmds:
      - docker start atticory-db

  db:stop:
    desc: Stop the local PostgreSQL container
    cmds:
      - docker stop atticory-db

  db:deploy:
    desc: "Create database tables (idempotent). Usage: task db:deploy [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python scripts/deploy_tables.py

  db:reset:
    desc: "Drop and recreate all tables (DESTRUCTIVE). Usage: task db:reset [ENV=local]"
    dir: backend
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - uv run python scripts/deploy_tables.py --reset

  db:psql:
    desc: "Open psql shell. Usage: task db:psql [ENV=local]"
    dir: backend
    interactive: true
    dotenv:
      - '.env.{{.ENV | default "local"}}'
    cmds:
      - PGPASSWORD="${DB_PASSWORD}" psql -h "${DB_HOST}" -p "${DB_PORT}" -U "${DB_USER}" -d "${DB_NAME}"
